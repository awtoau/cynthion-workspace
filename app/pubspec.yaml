name: cynthion_monitor
description: Cynthion hardware monitor — topology graph, TTY logs, power rails.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.2
  fl_chart: ^0.69.0
  web_socket_channel: ^3.0.1
  flutter_blue_plus: ^1.35.5
  multicast_dns: ^0.3.2+4
  window_manager: ^0.5.1
  awto_gui_inspect:
    path: ../../awto-gui-inspect-flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/hardware/
